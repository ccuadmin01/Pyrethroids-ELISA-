<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELISA Assayer | QC Validation</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --success: #059669;
            --success-bg: #d1fae5;
            --warning: #dc2626;
            --warning-bg: #fee2e2;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calculator-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.75rem;
            color: var(--primary);
        }

        .header p {
            margin: 0.5rem 0 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .section-title {
            font-size: 1rem;
            color: var(--secondary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
            font-weight: 600;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background-color: #ffffff;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--secondary-hover);
        }

        .error-message {
            display: none;
            background-color: var(--warning-bg);
            color: var(--warning);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid #fecaca;
        }

        .results {
            margin-top: 2rem;
            display: none;
        }

        .validation-banner {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-align: center;
        }

        .banner-valid {
            background-color: var(--success-bg);
            color: var(--success);
            border: 1px solid #a7f3d0;
        }

        .banner-invalid {
            background-color: var(--warning-bg);
            color: var(--warning);
            border: 1px solid #fecaca;
        }

        .error-details {
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0.5rem;
            display: block;
        }

        .result-box {
            background-color: var(--bg-color);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .value {
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .status-high { color: var(--warning); }
        .status-low { color: var(--success); }
    </style>
</head>
<body>

    <div class="calculator-card">
        <div class="header">
            <h1>ELISA Assay Calculator</h1>
            <p>Pesticide Analysis with QC Validation</p>
        </div>

        <form id="elisaForm">
            <div class="section-title">Calibration & Controls</div>
            <div class="grid-inputs">
                <div class="input-group full-width">
                    <label for="b0">Zero Standard (B₀) OD₄₅₀</label>
                    <input type="number" id="b0" step="any" placeholder="e.g., 1.850" required>
                </div>
                <div class="input-group">
                    <label for="negCtrl">Negative Control OD</label>
                    <input type="number" id="negCtrl" step="any" placeholder="e.g., 1.790" required>
                </div>
                <div class="input-group">
                    <label for="posCtrl">Positive Control OD</label>
                    <input type="number" id="posCtrl" step="any" placeholder="e.g., 0.850" required>
                </div>
            </div>

            <div class="section-title">Sample Data</div>
            <div class="input-group full-width">
                <label for="sample">Sample OD₄₅₀</label>
                <input type="number" id="sample" step="any" placeholder="e.g., 0.450" required>
            </div>

            <button type="submit">Run Assay Analysis</button>
        </form>

        <div id="uiError" class="error-message"></div>

        <div class="results" id="resultsPanel">
            <div id="validationBanner" class="validation-banner banner-valid">
                <span id="validationStatus">Assay Valid</span>
                <span id="validationDetails" class="error-details">Controls are within acceptable parameters.</span>
            </div>

            <div class="result-box">
                <div class="result-item">
                    <span>Relative Binding (B/B₀):</span>
                    <span class="value" id="bindingResult">0.00%</span>
                </div>
                <div class="result-item">
                    <span>Sample Inhibition:</span>
                    <span class="value" id="inhibitionResult">0.00%</span>
                </div>
                <div class="result-item">
                    <span>Assessment:</span>
                    <span class="value" id="assessmentResult">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Helper function to calculate Inhibition
        function calculateInhibition(od, b0) {
            const binding = (od / b0) * 100;
            return 100 - binding;
        }

        // Attach event listener to the form to handle submission naturally
        document.getElementById('elisaForm').addEventListener('submit', function(event) {
            // Prevent the page from refreshing when you click the button
            event.preventDefault();

            // Reset UI
            const errorBox = document.getElementById('uiError');
            const resultsPanel = document.getElementById('resultsPanel');
            errorBox.style.display = 'none';
            resultsPanel.style.display = 'none';

            // Fetch and parse Values securely
            const b0_OD = parseFloat(document.getElementById('b0').value);
            const neg_OD = parseFloat(document.getElementById('negCtrl').value);
            const pos_OD = parseFloat(document.getElementById('posCtrl').value);
            const sample_OD = parseFloat(document.getElementById('sample').value);

            // Strict Validation
            if (isNaN(b0_OD) || isNaN(neg_OD) || isNaN(pos_OD) || isNaN(sample_OD)) {
                errorBox.innerText = "Error: Please fill out all fields with valid numbers.";
                errorBox.style.display = 'block';
                return;
            }

            if (b0_OD <= 0) {
                errorBox.innerText = "Error: Zero Standard (B₀) must be greater than zero.";
                errorBox.style.display = 'block';
                return;
            }

            // Quality Control Calculations
            const negInhibition = calculateInhibition(neg_OD, b0_OD);
            const posInhibition = calculateInhibition(pos_OD, b0_OD);
            
            let assayValid = true;
            let errorMsg = [];

            if (negInhibition > 20) {
                assayValid = false;
                errorMsg.push(`Neg Control Inhibition too high (${negInhibition.toFixed(1)}%).`);
            }
            if (posInhibition < 30) {
                assayValid = false;
                errorMsg.push(`Pos Control Inhibition too low (${posInhibition.toFixed(1)}%).`);
            }

            // Update Validation UI
            const banner = document.getElementById('validationBanner');
            const statusText = document.getElementById('validationStatus');
            const detailsText = document.getElementById('validationDetails');

            if (assayValid) {
                banner.className = "validation-banner banner-valid";
                statusText.innerText = "✓ Assay Valid";
                detailsText.innerText = `Pos Control Inhibition: ${posInhibition.toFixed(1)}% | Neg Control: ${negInhibition.toFixed(1)}%`;
            } else {
                banner.className = "validation-banner banner-invalid";
                statusText.innerText = "⚠ Assay Invalid";
                detailsText.innerText = errorMsg.join(" ");
            }

            // Sample Calculations
            const relativeBinding = (sample_OD / b0_OD) * 100;
            const sampleInhibition = 100 - relativeBinding;

            // Print Results securely
            document.getElementById('bindingResult').innerText = relativeBinding.toFixed(2) + '%';
            document.getElementById('inhibitionResult').innerText = sampleInhibition.toFixed(2) + '%';

            // Sample Assessment
            const assessmentEl = document.getElementById('assessmentResult');
            if (sampleInhibition > 20) {
                assessmentEl.innerText = "Positive (Elevated Toxin)";
                assessmentEl.className = "value status-high";
            } else if (sampleInhibition < 0) {
                assessmentEl.innerText = "Negative (OD > B₀)";
                assessmentEl.className = "value status-low";
            } else {
                assessmentEl.innerText = "Negative (Normal)";
                assessmentEl.className = "value status-low";
            }

            // Show results
            resultsPanel.style.display = 'block';
        });
    </script>
</body>
</html>
